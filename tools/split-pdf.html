<!-- JAVASCRIPT -->

<script>

const dropZone = document.getElementById('dropZone');

const fileInput = document.getElementById('fileInput');

const fileUI = document.getElementById('fileUI');

const fileName = document.getElementById('fileName');

const splitBtn = document.getElementById('splitBtn');

const pageInput = document.getElementById('pageInput');

const statusMsg = document.getElementById('statusMsg');

let selectedFile = null;

/* CLICK */

dropZone.addEventListener('click',()=>{

    fileInput.click();

});

/* CHANGE */

fileInput.addEventListener('change',(e)=>{

    handleFile(e.target.files[0]);

});

/* DRAG */

dropZone.addEventListener('dragover',(e)=>{

    e.preventDefault();

    dropZone.classList.add('bg-opacity-30');

});

/* LEAVE */

dropZone.addEventListener('dragleave',(e)=>{

    e.preventDefault();

    dropZone.classList.remove('bg-opacity-30');

});

/* DROP */

dropZone.addEventListener('drop',(e)=>{

    e.preventDefault();

    dropZone.classList.remove('bg-opacity-30');

    handleFile(e.dataTransfer.files[0]);

});

/* HANDLE FILE */

function handleFile(file){

    if(!file || file.type !== 'application/pdf'){

        alert('Please select valid PDF file.');

        return;

    }

    selectedFile = file;

    fileUI.classList.remove('hidden');

    fileName.innerHTML = `
    
        <div class="flex items-center gap-3">

            <i class="fas fa-file-pdf text-brandRed text-2xl"></i>

            <span class="font-medium text-gray-700">
                ${file.name}
            </span>

        </div>
    
    `;

}

/* SPLIT PDF */

splitBtn.addEventListener('click', async ()=>{

    if(!selectedFile){

        alert('Please upload PDF.');

        return;

    }

    const pages = pageInput.value
        .split(',')
        .map(p => parseInt(p.trim()))
        .filter(p => !isNaN(p));

    if(pages.length === 0){

        alert('Enter valid page numbers.');

        return;

    }

    splitBtn.disabled = true;

    splitBtn.innerHTML = `
    
        <i class="fas fa-spinner fa-spin mr-2"></i>
        Processing...
    
    `;

    statusMsg.classList.remove('hidden');

    statusMsg.innerText =
        'Processing your PDF securely in browser...';

    statusMsg.className =
        'text-center mt-3 text-sm font-bold text-blue-600';

    try{

        const { PDFDocument } = PDFLib;

        const zip = new JSZip();

        const bytes =
            await selectedFile.arrayBuffer();

        const pdf =
            await PDFDocument.load(bytes);

        for(let pageNum of pages){

            if(pageNum < 1 || pageNum > pdf.getPageCount()){

                continue;

            }

            const newPdf =
                await PDFDocument.create();

            const [copiedPage] =
                await newPdf.copyPages(pdf,[pageNum - 1]);

            newPdf.addPage(copiedPage);

            const pdfBytes =
                await newPdf.save();

            zip.file(
                `page-${pageNum}.pdf`,
                pdfBytes
            );

        }

        const zipBlob =
            await zip.generateAsync({
                type:'blob'
            });

        const url =
            URL.createObjectURL(zipBlob);

        const a =
            document.createElement('a');

        a.href = url;

        a.download =
            'ToolMitra_Split_PDF.zip';

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        statusMsg.innerText =
            'Success! Your split PDF files are downloading.';

        statusMsg.className =
            'text-center mt-3 text-sm font-bold text-green-600';

        splitBtn.innerHTML =
            'Split More PDFs <i class="fas fa-redo ml-2"></i>';

        splitBtn.disabled = false;

    }

    catch(error){

        console.error(error);

        statusMsg.innerText =
            'Oops! Something went wrong.';

        statusMsg.className =
            'text-center mt-3 text-sm font-bold text-red-600';

        splitBtn.innerHTML =
            'Try Again';

        splitBtn.disabled = false;

    }

});

</script>
